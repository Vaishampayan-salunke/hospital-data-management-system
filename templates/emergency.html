<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Emergency Management</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
<div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li>
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li>
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li>
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li class="active">
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li>
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>

    <!-- MAIN -->
    <div class="main-content p-4 w-100">

        <h1 class="mb-4">
            Emergency Management
        </h1>

        <!-- FORM -->
        <div class="card p-4 mb-4">

            <h4 class="mb-4">
                Emergency Intake
            </h4>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="emergencyId"
                        class="form-control"
                        placeholder="Emergency ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="emergencyPatientName"
                        class="form-control"
                        placeholder="Patient Name"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="number"
                        id="emergencyAge"
                        class="form-control"
                        placeholder="Age"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="emergencyCondition"
                        class="form-control"
                        placeholder="Condition"
                    >
                </div>

                <div class="col-md-4 mb-3">

                    <select
                        id="emergencyPriority"
                        class="form-control"
                    >

                        <option value="">
                            Select Priority
                        </option>

                        <option value="Critical">
                            Critical
                        </option>

                        <option value="High">
                            High
                        </option>

                        <option value="Medium">
                            Medium
                        </option>

                        <option value="Low">
                            Low
                        </option>

                    </select>

                </div>

                <div class="col-md-4 mb-3">

                    <select
                        id="ambulanceStatus"
                        class="form-control"
                    >

                        <option value="">
                            Ambulance Status
                        </option>

                        <option value="Requested">
                            Requested
                        </option>

                        <option value="On The Way">
                            On The Way
                        </option>

                        <option value="Arrived">
                            Arrived
                        </option>

                    </select>

                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="emergencyContact"
                        class="form-control"
                        placeholder="Emergency Contact"
                    >
                </div>

                <div class="col-md-4 mb-3">

                    <select
                        id="caseStatus"
                        class="form-control"
                    >

                        <option value="">
                            Case Status
                        </option>

                        <option value="Under Treatment">
                            Under Treatment
                        </option>

                        <option value="Critical">
                            Critical
                        </option>

                        <option value="Recovered">
                            Recovered
                        </option>

                    </select>

                </div>

            </div>

            <button
                id="emergencySubmitButton"
                class="btn btn-danger w-100"
            >
                Add Emergency Case
            </button>

        </div>

        <!-- SEARCH -->
        <div class="card p-3 mb-4">

            <input
                type="text"
                id="emergencySearchInput"
                class="form-control"
                placeholder="Search Emergency Cases"
                onkeyup="searchEmergency()"
            >

        </div>

        <!-- TABLE -->
        <div class="card p-4">

            <h3 class="mb-4">
                Emergency Cases
            </h3>

            <div class="table-responsive">

                <table class="table table-bordered">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Patient</th>
                            <th>Age</th>
                            <th>Condition</th>
                            <th>Priority</th>
                            <th>Ambulance</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="emergencyTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="/static/js/emergency.js"></script>

</body>
</html>
