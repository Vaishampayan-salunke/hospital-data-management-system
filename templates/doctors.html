<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Doctor Management</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
<div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li>
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li class="active">
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li>
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li>
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li>
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>


    <!-- MAIN CONTENT -->
    <div class="main-content p-4 w-100">

        <h1 class="mb-4">
            Doctor Management
        </h1>


        <!-- ADD DOCTOR FORM -->
        <div class="card p-4 mb-4">

            <h4 class="mb-4">
                Add Doctor
            </h4>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorId"
                        class="form-control"
                        placeholder="Doctor ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorName"
                        class="form-control"
                        placeholder="Doctor Name"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorDepartment"
                        class="form-control"
                        placeholder="Department"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorSpecialization"
                        class="form-control"
                        placeholder="Specialization"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="number"
                        id="doctorExperience"
                        class="form-control"
                        placeholder="Experience (Years)"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorQualification"
                        class="form-control"
                        placeholder="Qualification"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorTiming"
                        class="form-control"
                        placeholder="Available Timings"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="number"
                        id="doctorFees"
                        class="form-control"
                        placeholder="Consultation Fees"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorPhone"
                        class="form-control"
                        placeholder="Phone"
                    >
                </div>

                <div class="col-md-4 mb-3">

                    <select
                        id="doctorAvailability"
                        class="form-control"
                    >

                        <option value="">
                            Select Availability
                        </option>

                        <option value="Available">
                            Available
                        </option>

                        <option value="Busy">
                            Busy
                        </option>

                        <option value="On Leave">
                            On Leave
                        </option>

                    </select>

                </div>

            </div>

            <button
                id="doctorSubmitButton"
                class="btn btn-primary"
            >
                Add Doctor
            </button>

        </div>


        <!-- SEARCH -->
        <div class="card p-3 mb-4">

            <input
                type="text"
                id="doctorSearchInput"
                class="form-control"
                placeholder="Search Doctor by Name"
                onkeyup="searchDoctor()"
            >

        </div>


        <!-- TABLE -->
        <div class="card p-4">

            <h4 class="mb-4">
                Doctor Records
            </h4>

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Specialization</th>
                            <th>Experience</th>
                            <th>Qualification</th>
                            <th>Timing</th>
                            <th>Fees</th>
                            <th>Phone</th>
                            <th>Availability</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="doctorTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>


<script src="/static/js/doctors.js"></script>

</body>
</html>
