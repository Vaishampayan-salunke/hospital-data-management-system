<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Appointment Management</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
<div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li>
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li>
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li class="active">
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li>
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li>
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>


    <!-- MAIN CONTENT -->
    <div class="main-content p-4 w-100">

        <h1 class="mb-4">
            Appointment Management
        </h1>


        <!-- APPOINTMENT FORM -->
        <div class="card p-4 mb-4">

            <h4 class="mb-4">
                Schedule Appointment
            </h4>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="appointmentId"
                        class="form-control"
                        placeholder="Appointment ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="patientId"
                        class="form-control"
                        placeholder="Patient ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="patientName"
                        class="form-control"
                        placeholder="Patient Name"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorId"
                        class="form-control"
                        placeholder="Doctor ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="doctorName"
                        class="form-control"
                        placeholder="Doctor Name"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="appointmentDepartment"
                        class="form-control"
                        placeholder="Department"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="date"
                        id="appointmentDate"
                        class="form-control"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input
                        type="time"
                        id="appointmentTime"
                        class="form-control"
                    >
                </div>

                <div class="col-md-4 mb-3">

                    <select
                        id="appointmentStatus"
                        class="form-control"
                    >

                        <option value="">
                            Select Status
                        </option>

                        <option value="Scheduled">
                            Scheduled
                        </option>

                        <option value="Completed">
                            Completed
                        </option>

                        <option value="Cancelled">
                            Cancelled
                        </option>

                    </select>

                </div>

            </div>

            <button
                id="appointmentSubmitButton"
                class="btn btn-primary"
            >
                Add Appointment
            </button>

        </div>


        <!-- SEARCH -->
        <div class="card p-3 mb-4">

            <input
                type="text"
                id="appointmentSearchInput"
                class="form-control"
                placeholder="Search Appointment"
                onkeyup="searchAppointments()"
            >

        </div>


        <!-- TABLE -->
        <div class="card p-4">

            <h4 class="mb-4">
                Appointment Records
            </h4>

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="appointmentTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="/static/js/appointments.js"></script>
</body>
</html>
