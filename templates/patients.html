<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patients Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li class="active">
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li>
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li>
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li>
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li>
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>

    <!-- MAIN CONTENT -->
    <div class="main-content p-4 w-100">

        <h1 class="mb-4">Patient Management</h1>

        <!-- ADD PATIENT FORM -->
        <div class="card p-4 mb-4">

            <h4>Add Patient</h4>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <input
                        type="text"
                        id="patientId"
                        class="form-control"
                        placeholder="Patient ID"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="patientName" class="form-control" placeholder="Patient Name">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="number" id="patientAge" class="form-control" placeholder="Age">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="patientGender" class="form-control" placeholder="Gender">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="patientPhone" class="form-control" placeholder="Phone">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="patientDisease" class="form-control" placeholder="Disease">
                </div>

            </div>

            <button
                id="patientSubmitButton"
                class="btn btn-primary"
            >
                Add Patient
            </button>

            </div>

        <!-- SEARCH -->
        <div class="card p-3 mb-4">

            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search Patient by Name"
                onkeyup="searchPatient()"
            >

        </div>

        <!-- PATIENT TABLE -->
        <div class="card p-4">

            <h4>Patient Records</h4>

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Phone</th>
                            <th>Disease</th>
                            <th>Actions</th>
                        </tr>

                    </thead>

                    <tbody id="patientTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="/static/js/patients.js"></script>

</body>

</html>
