<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Management Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="d-flex">

        <!-- SIDEBAR -->
<div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li class="active">
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li>
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li>
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li>
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li>
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>

        <!-- MAIN CONTENT -->
        <div class="main-content p-4 w-100">

            <h1 class="mb-4">Dashboard</h1>

            <div class="row">

                <div class="col-md-3">
                    <div class="card dashboard-card bg-primary text-white">
                        <div class="card-body">
                            <h5>Total Patients</h5>
                            <h2 id="totalPatients">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card bg-success text-white">
                        <div class="card-body">
                            <h5>Total Doctors</h5>
                            <h2 id="totalDoctors">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card bg-warning text-dark">
                        <div class="card-body">
                            <h5>Appointments</h5>
                            <h2 id="totalAppointments">0</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card bg-danger text-white">
                        <div class="card-body">
                            <h5>Emergency Cases</h5>
                            <h2 id="totalEmergency">0</h2>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
