<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
<div class="sidebar">

    <h1 class="logo">
        Hospital HMS
    </h1>

    <ul>

        <li>
            <a href="/dashboard">
                Dashboard
            </a>
        </li>

        <li>
            <a href="/patients-page">
                Patients
            </a>
        </li>

        <li>
            <a href="/doctors-page">
                Doctors
            </a>
        </li>

        <li>
            <a href="/appointments-page">
                Appointments
            </a>
        </li>

        <li>
            <a href="/emergency-page">
                Emergency
            </a>
        </li>

        <li class="active">
            <a href="/analytics-page">
                Analytics
            </a>
        </li>

    </ul>

</div>

    <!-- MAIN CONTENT -->
    <div class="main-content p-4 w-100">

        <h1 class="mb-4">
            Analytics Dashboard
        </h1>

        <!-- CARDS -->
<div class="row mb-4 g-4">

    <div class="col-md-3">

        <div class="card analytics-card">

            <h5>Total Patients</h5>

            <h2 id="analyticsPatients">
                0
            </h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card analytics-card">

            <h5>Total Doctors</h5>

            <h2 id="analyticsDoctors">
                0
            </h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card analytics-card">

            <h5>Total Appointments</h5>

            <h2 id="analyticsAppointments">
                0
            </h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card analytics-card">

            <h5>Emergency Cases</h5>

            <h2 id="analyticsEmergency">
                0
            </h2>

        </div>

    </div>

</div>

        <!-- CHARTS -->
        <div class="row">

            <div class="col-md-6 mb-4">

                <div class="card p-4 shadow-sm">

                    <h4 class="mb-4">
                        Appointment Status
                    </h4>

                    <canvas id="appointmentChart"></canvas>

                </div>

            </div>

            <div class="col-md-6 mb-4">

                <div class="card p-4 shadow-sm">

                    <h4 class="mb-4">
                        Emergency Priority
                    </h4>

                    <canvas id="emergencyChart"></canvas>

                </div>

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-4">

                <div class="card p-4 shadow-sm">

                    <h4 class="mb-4">
                        Patients vs Doctors
                    </h4>

                    <canvas id="patientDoctorChart"></canvas>

                </div>

            </div>

            <div class="col-md-6 mb-4">

                <div class="card p-4 shadow-sm">

                    <h4 class="mb-4">
                        Hospital Distribution
                    </h4>

                    <canvas id="hospitalPieChart"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Analytics JS -->
<script src="/static/js/analytics.js"></script>
</body>
</html>
